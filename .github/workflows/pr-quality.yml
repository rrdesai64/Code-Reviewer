name: PR Quality Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-lint-and-dogfood:
    name: Tests, coverage, lint, and self-scan
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install SAML native libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxmlsec1-dev libxmlsec1-openssl pkg-config

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint Python
        run: python -m ruff check app tests

      - name: Run tests with coverage
        run: python -m pytest --cov=app --cov-report=term-missing --cov-report=xml

      - name: Dogfood secure reviewer on this repository
        run: |
          python -m app.cli --path . --json-out secure-review-self-scan.json --sarif-out secure-review-self-scan.sarif --report-out secure-review-self-scan.md --scanner-depth-out scanner-depth.json --catalog-coverage-out catalog-coverage-map.json --benchmark-gate-out benchmark-gate.json --governance-out governance-evidence.json

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-quality-artifacts
          path: |
            coverage.xml
            secure-review-self-scan.json
            secure-review-self-scan.sarif
            secure-review-self-scan.md
            scanner-depth.json
            catalog-coverage-map.json
            benchmark-gate.json
            governance-evidence.json
