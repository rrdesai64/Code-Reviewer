name: Secure Code Review

on:
  pull_request:
  workflow_dispatch:

jobs:
  secure-review:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install scanner dependencies
        run: |
          python -m pip install -r requirements.txt
      - name: Run secure review
        run: |
          python -m app.cli --path . --sarif-out secure-review.sarif --report-out secure-review.md --pr-comment-out pr-comment.md --sonarqube-out sonarqube-quality-gate.json --scanner-depth-out scanner-depth.json --fix-bundle-out fix-bundle.json --issue-plan-out issue-plan.json --chat-notification-out chat-notification.json --code-host-review-out code-host-review.json --fix-apply-out fix-apply-dry-run.json --fail-on high
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: secure-review.sarif
        if: always()
      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secure-review
          path: |
            secure-review.sarif
            secure-review.md
            pr-comment.md
            sonarqube-quality-gate.json
            scanner-depth.json
            fix-bundle.json
            fix-apply-dry-run.json
            issue-plan.json
            chat-notification.json
            code-host-review.json
        if: always()
